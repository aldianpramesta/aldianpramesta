  <style>
    /* Mengimpor font dari Google Fonts */

    body {
      margin: 0;
      background-color: #000; /* Warna latar belakang hitam */

      font-family: 'Instrument Sans', sans-serif; /* Font utama */

    }

/* ========== Animasi Global, lagi diilangin dulu ga ada yang pas ========== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
    
    /* Section 1 - Judul Nama */

      height: auto; /* Otomatis mengikuti isi */

    }

    }

    .section-2 h2 {

      line-height: 1.2em;
      margin: 0; /* Hilangkan margin bawaan */

    /* Section 3 - Info Utama */
    .section-3 {
      height: auto; /* Fleksibel berdasarkan isi */

    }
    .section-3 .info {

    }
    .section-3 .village {
      font-weight: bold;
      font-size: 115px; /* Ukuran besar banget */
      letter-spacing: -5px; /* Hurufnya saling rapat */

    .section-3 .quote {

      line-height: 1.8em;

      color: #ffffff;
      white-space: pre-line; /* Supaya enter di teks quote tetap muncul */
      margin: 0;
    }

    /* Section 4 - Modul Percintaan */
.section-4 {
  height: auto; /* auto agar menyesuaikan isi */
  padding: 0px 16px; /* padding atas bawah besar, samping sedang */
  text-align: center;
}

.section-4 .judul-modul {
  font-family: 'Instrument Sans', sans-serif;
  font-weight: bold;
  color: #ffffff;
  font-size: 35px;
  letter-spacing: -0.04em;
  line-height: 1.8em;
  margin-bottom: 0px;
}

.section-4 .video-wrapper {
  margin-bottom: 0px;
}

.section-4 .deskripsi-modul {
  font-family: 'Instrument Sans', sans-serif;
  font-weight: 500;
  color: #ffffff;
  font-size: 16px;
  letter-spacing: -0.04em;
  line-height: 1.8em;
  margin: 0;
}
    
    .gate-button {
      position: relative;
      width: 200px;
      height: 60px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: white;
      overflow: hidden;
      font-family: 'Instrument Sans', sans-serif;
    }

    .gate-button .gate {
      position: absolute;
      width: 50%;
      height: 100%;
      top: 0;
      background: #38804B;
      transition: transform 0.5s ease;
      z-index: 1;
    }

    .gate-button .left {
      left: 0;
      border-right: 1px solid #333;
    }

    .gate-button .right {
      right: 0;
      border-left: 1px solid #333;
    }

    .gate-button .text {
  position: relative;
  z-index: 2;
  color: #fff; /* ← ini bikin teks jadi merah */
  transition: color 0.3s ease;
      font-weight: bold;
    }

    .gate-button:hover .left {
      transform: translateX(-100%);
    }

    .gate-button:hover .right {
      transform: translateX(100%);
    }

    .gate-button:hover .text {
      color: #966406;
    }

/* Section 5 - Pricing Cards */
.section-5 {
  height: auto; /* Diubah jadi otomatis mengikuti isi barang */
  padding: 60px 16px; /* Ditambah sedikit jarak atasnya biar gak nempel branding */
  display: flex;
  justify-content: flex-start; /* Dimulai normal dari atas ke bawah */
  align-items: center;
}

.info-modul-title {
  font-family: 'Instrument Sans', sans-serif;
  font-weight: bold;
  color: #ffffff;
  font-size: 35px;
  letter-spacing: -0.04em;
  line-height: 1.8em;
  margin-bottom: 0px;
  text-align: center;
}

    .info-modul-deskripsi {
  font-family: 'Instrument Sans', sans-serif;
  font-weight: 500;
  color: #ffffff;
  font-size: 16px;
  letter-spacing: -0.04em;
  line-height: 1.8em;
  margin: 0 0 40px 0;
  text-align: center;
}
    
.pricing-wrapper {
  display: flex;
  gap: 24px;
  width: 100%;
  max-width: 1200px;
  justify-content: space-between;
  flex-wrap: wrap;
}

.product-name {
  font-weight: 600;
  font-size: 24px; /* <- Nanti kalau mau ubah ukuran semua teks produk, tinggal ganti angka ini aja! */
  margin-bottom: 16px;
  color: #ffffff;
}
    
.product-image-container {
  width: 100%;
  height: 200px;
  margin-bottom: 16px;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.product-image-container img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
    
.pricing-card {

  border-radius: 12px;

  display: flex;

  justify-content: flex-start;
}

.harga-durasi {
  display: flex;
  gap: 8px;
  align-items: baseline;
  margin-bottom: 45px;
}

.harga-durasi .harga {
  font-family: 'Instrument Sans', sans-serif;
  font-weight: 600;
  font-size: 18px;
  line-height: 10px;
  color: #ffffff;
}

.harga-durasi .durasi {
  font-family: 'Instrument Sans', sans-serif;
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 0.8px;
  line-height: 15px;
  color: #808080;
}

.pricing-card .judul-modul {
  font-family: 'Instrument Sans', sans-serif;
  font-weight: 600;
  font-size: 18px;
  line-height: 20px;
  color: #ffffff;
  margin-bottom: 45px;
  text-align: left;
}

.pricing-card .deskripsi {
  font-family: 'Instrument Sans', sans-serif;
  font-weight: 500;
  font-size: 18px;
  line-height: 23.4px;
  color: #808080;
  margin-bottom: 80px;
  text-align: left;
}

.pricing-card .keuntungan {
  font-family: 'Instrument Sans', sans-serif;
  font-weight: 500;
  font-size: 18px;
  line-height: 22px;
  color: #ffffff;
  margin-bottom: 12px;
  text-align: left;
  padding-left: 14px; /* ← ini bikin agak geser kanan */
}

.pricing-card .fitur {
  list-style: none;
  padding: 0;
  margin: 0;
  padding-left: 14px; /* ← ini bikin agak geser kanan */

.pricing-card .fitur li {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}

.pricing-card .check {
  font-size: 13px;

}

.pricing-card .text {
  font-family: 'Instrument Sans', sans-serif;
  font-weight: 500;
  font-size: 15px;
  letter-spacing: 0.8px;

}

    .pricing-card .harga-coret {
  font-family: 'Instrument Sans', sans-serif;

  font-size: 14px;
  line-height: 15px;
  color: #808080;

}

.pricing-card .deskripsi-harga {
  font-family: 'Instrument Sans', sans-serif;
  font-weight: 500;
  font-size: 16px;
  letter-spacing: -0.04em;
  line-height: 1.8em;
  color: #ffffff;
  margin-top: -40px;
  margin-bottom: 40px;

}

/* Styling untuk Tombol Halaman (Pagination) */
.pagination-wrapper-buttons {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-top: 40px;
  width: 100%;
}

.page-btn {
  background-color: #111111;
  color: #ffffff;
  border: 1px solid #333333;
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.2s ease;
}

.page-btn.active {
  background-color: #ffffff;
  color: #000000;
  border-color: #ffffff;
}

.page-btn:hover:not(.active) {
  background-color: #222222;
  border-color: #555555;
}
    
  </style>
</head>
<body>
  <!-- Section 1: Nama & Branding -->
  <section class="section-1">
    <div class="judul">
      ALDIAN PRAMESTA <span class="temter">TEMTER</span>
    </div>
  </section>

<!-- Section 5: Pricing -->
<style>
  /* Styling khusus untuk Search Bar */
  .search-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
    width: 100%;
  }
  .search-bar {
    width: 100%;
    max-width: 360px;
    padding: 12px 16px;
    background-color: #111111;
    color: #ffffff;
    border: 1px solid #333333;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar:focus {
    border-color: #ffffff;
  }
</style>

<section class="section-5">
  <!-- Input Search Bar Baru -->
  <div class="search-wrapper">
    <input type="text" id="search-input" placeholder="Cari produk di sini..." class="search-bar">
  </div>

  <!-- Wadah Produk -->
  <div class="pricing-wrapper" id="tempat-produk"></div>
  
  <!-- Wadah Tombol Halaman (1 2 3) -->
  <div id="pagination-container" class="pagination-wrapper-buttons"></div>
</section>

<script>
  // 1. DATA PRODUK (Tinggal tambah baris baru sebanyak-banyaknya di sini!)
  const daftarProduk = [
    { name: "Rinso Deterjen Cair 1.44kg", price: "Rp149.000", img: "images/Rinso Deterjen Bubuk 1.44g.png" },
    { name: "Soklin Cair 800ml", price: "Rp25.000", img: "images/soklin.png" },
    { name: "Pepsodent 190g", price: "Rp15.000", img: "images/pepsodent.png" },
    // Contoh produk tambahan untuk tes halaman/pencarian
    { name: "Produk Contoh Ke-4", price: "Rp50.000", img: "images/placeholder.png" },
    { name: "Produk Contoh Ke-5", price: "Rp75.000", img: "images/placeholder.png" },
    { name: "Produk Contoh Ke-6", price: "Rp90.000", img: "images/placeholder.png" },
    { name: "Produk Contoh Ke-7", price: "Rp12.000", img: "images/placeholder.png" }
  ];

  // 2. PENGATURAN HALAMAN & PENCARIAN
  let currentPage = 1;      
  const itemsPerPage = 6;   // Mengatur maksimal produk yang muncul per halaman

  // Fungsi untuk menampilkan produk berdasarkan halaman & filter pencarian
  function tampilkanProduk(page) {
    const container = document.getElementById('tempat-produk');
    container.innerHTML = ""; // Bersihkan produk halaman sebelumnya

    // Ambil kata kunci ketikan dari search bar
    const kataKunci = document.getElementById('search-input').value.toLowerCase();

    // Saring list produk yang namanya cocok dengan ketikan user
    const produkDifilter = daftarProduk.filter(produk => 
      produk.name.toLowerCase().includes(kataKunci)
    );

    // Rumus memotong list produk berdasarkan halaman
    const startIndex = (page - 1) * itemsPerPage;
    const endIndex = page * itemsPerPage;
    const produkHalamanIni = produkDifilter.slice(startIndex, endIndex);

    // Render/gambar produk ke web
    produkHalamanIni.forEach(produk => {
      container.innerHTML += `
        <div class="pricing-card">
          <div class="product-image-container">
            <img src="${produk.img}" alt="${produk.name}">
          </div>
          <div class="product-name">${produk.name}</div>
          <div class="harga-durasi">
            <span class="harga">${produk.price}</span>
          </div>
        </div>
      `;
    });

    // Perbarui cetakan tombol halaman berdasarkan jumlah produk hasil filter
    buatTombolNavigasi(produkDifilter.length);
  }

  // Fungsi membuat tombol angka 1, 2, 3 secara otomatis
  function buatTombolNavigasi(totalItems) {
    const paginationContainer = document.getElementById('pagination-container');
    paginationContainer.innerHTML = ""; 

    const totalPages = Math.ceil(totalItems / itemsPerPage);
    
    // Kalau halaman cuma 1 atau kosong, sembunyikan tombol halaman
    if (totalPages <= 1) return;

    for (let i = 1; i <= totalPages; i++) {
      const button = document.createElement('button');
      button.innerText = i;
      button.classList.add('page-btn');
      
      if (i === currentPage) button.classList.add('active');

      button.addEventListener('click', () => {
        currentPage = i;
        tampilkanProduk(currentPage);
        document.getElementById('tempat-produk').scrollIntoView({ behavior: 'smooth' });
      });

      paginationContainer.appendChild(button);
    }
  }

// Sediakan botol penampung waktu (timer)
  let timerPencarian;

  // Event listener: Setiap kali user mengetik sesuatu di search bar
  document.getElementById('search-input').addEventListener('input', () => {
    // Hapus timer lama kalau user masih mencet tombol keyboard (reset waktu)
    clearTimeout(timerPencarian);

    // Bikin timer baru, tunggu 300 milidetik (0.3 detik) pasca ketikan terakhir
    timerPencarian = setTimeout(() => {
      currentPage = 1; 
      tampilkanProduk(currentPage);
      console.log("Pencarian dieksekusi!"); // Opsional: Buat ngecek di inspect elemen
    }, 3000); 
  });

  // Jalankan sistem pertama kali saat web dibuka
  tampilkanProduk(currentPage);
</script>
</body>
</html>
