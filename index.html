<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEMTER</title>

  <script>
  function showOptions() {
    document.getElementById('options').style.display = 'block';
  }
  </script>

  <style>
    /* Mengimpor font dari Google Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@1&display=swap');

    body {
      margin: 0;
      background-color: #000; /* Warna latar belakang hitam */
      color: #ffffff; /* Warna teks default putih */
      font-family: 'Instrument Sans', sans-serif; /* Font utama */
    }

    section {
      width: 100%; /* Lebar penuh */
      display: flex; /* Flexbox layout */
      flex-direction: column; /* Susun elemen ke bawah */
      justify-content: center;
      align-items: center; /* Posisi tengah secara horizontal */
    }

    /* ========== Animasi Global ========== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Section 1 - Judul Nama */
    .section-1 {
      height: auto; /* Otomatis mengikuti isi */
      padding: 32px 16px; /* Spasi atas bawah 32px, samping 16px */
      display: block; /* Supaya kontennya gak center (default block) */
    }
    .section-1 .judul {
      font-weight: bold;
      font-size: 16px;
      letter-spacing: -0.04em; /* Spasi antar huruf lebih rapat */
      line-height: 1em;
      padding-left: 20px;
    }
    .section-1 .temter {
      font-family: 'Instrument Serif', serif; /* Font khusus untuk TEMTER */
      font-style: italic;
      font-weight: 400;
    }

    /* Section 5 - Pricing Cards */
    .section-5 {
      height: auto; /* Diubah jadi otomatis mengikuti isi barang */
      padding: 60px 16px; /* Ditambah sedikit jarak atasnya biar gak nempel branding */
      display: flex;
      justify-content: flex-start; /* Dimulai normal dari atas ke bawah */
      align-items: center;
    }
    
    .pricing-wrapper {
        display: flex;
        gap: 12px 24px;
        width: 100%;
        max-width: 1200px;
        justify-content: space-between; 
        flex-wrap: wrap;
    }

    .product-name {
      font-weight: 600;
      font-size: 24px; /* <- Ubah ukuran semua teks produk di sini */
      margin-bottom: 15px;
      color: #ffffff;
    }
    
    .product-image-container {
      width: 100%;
      height: 200px;
      margin-bottom: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .product-image-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    
    .pricing-card {
      background-color: #111111;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 360px;
      height: auto;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .harga-durasi {
      display: flex;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 45px;
    }

    .harga-durasi .harga {
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 600;
      font-size: 18px;
      line-height: 10px;
      color: #808080;
    }

    .harga-durasi .durasi {
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.8px;
      line-height: 15px;
      color: #808080;
    }

    /* Styling untuk Tombol Halaman (Pagination) */
    .pagination-wrapper-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 40px;
      width: 100%;
    }

    .page-btn {
      background-color: #111111;
      color: #ffffff;
      border: 1px solid #333333;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .page-btn.active {
      background-color: #ffffff;
      color: #000000;
      border-color: #ffffff;
    }

    .page-btn:hover:not(.active) {
      background-color: #222222;
      border-color: #555555;
    }

    /* ================= TAMPILAN KHUSUS HP (RESPONSIF) ================= */
    @media (max-width: 768px) {
        .pricing-wrapper {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px;
            padding: 0 4px;
        }

        .pricing-card {
            height: auto;
            padding: 8px 8px 20px 8px;
            border-radius: 8px;
        }

        .product-image-container {
            height: 80px; 
            margin-bottom: 8px;
        }

        .product-name {
            font-size: 14px;
            line-height: 1.2em;
            margin-bottom: 10px;
        }

        .harga-durasi {
            margin-bottom: 0px;
        }

        .harga-durasi .harga {
            font-size: 13px;
        }
    }
  </style>
</head>
<body>
  <!-- Section 1: Nama & Branding -->
  <section class="section-1">
    <div class="judul">
      ALDIAN PRAMESTA <span class="temter">TEMTER</span>
    </div>
  </section>

  <!-- Section 5: Pricing / Katalog Produk -->
  <style>
    /* Styling khusus untuk Search Bar & Tombol Hapus */
    .search-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      width: 100%;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
    }
    .search-bar {
      width: 100%;
      padding: 12px 40px 12px 16px;
      background-color: #111111;
      color: #ffffff;
      border: 1px solid #333333;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-bar:focus {
      border-color: #ffffff;
    }
    .clear-search-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #555555;
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      display: none;
      transition: color 0.2s;
    }
    .clear-search-btn:hover {
      color: #ffffff;
    }

    /* Styling khusus untuk Tombol Pilihan Kategori */
    .category-wrapper {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      width: 100%;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    .category-btn {
      background: none;
      color: #666666;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 8px 12px;
      border-radius: 0;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.2s ease;
    }
    .category-btn.active {
      color: #ffffff;
      border-bottom: 2px solid #ffffff;
    }
    .category-btn:hover:not(.active) {
      color: #bbbbbb;
    }
    .sort-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .sort-select {
      background-color: #111111;
      color: #ffffff;
      border: 1px solid #333333;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }
  </style>

    </div>

    <!-- Wadah Tombol Kategori Otomatis -->
    <div id="category-container" class="category-wrapper"></div>

    <!-- Dropdown Urutan Harga -->
    <div class="sort-wrapper">
      <select id="sort-select" class="sort-select">
        <option value="asc">Termurah ke Termahal</option>
        <option value="desc">Termahal ke Termurah</option>
      </select>
    </div>

    <!-- Wadah Produk -->
    <div class="pricing-wrapper" id="tempat-produk"></div>
    
    <!-- Wadah Tombol Halaman (1 2 3) -->
    <div id="pagination-container" class="pagination-wrapper-buttons"></div>
  </section>

  { name: "Fortune Minyak Goreng", price: "Rp0", img: "images/products/minyak goreng/fortune minyak goreng.png", category: "Minyak Goreng" },

  { name: "Rose Brand Minyak Goreng", price: "Rp0", img: "images/products/minyak goreng/rose brand minyak goreng.png", category: "Minyak Goreng" },

  { name: "Super Pell Apple Sabun Lantai", price: "Rp0", img: "images/products/sabun pembersih lantai/super pell apple sabun lantai.png", category: "Sabun Pembersih Lantai" },

  { name: "Sidomuncul Vit C1000 Muscat Grape Minuman Seduh Supplement Kulit", price: "Rp0", img: "images/products/supplement/sidomuncul vit c1000 muscat grape minuman seduh supplement kulit.png", category: "Supplement" },

  { name: "Good Day Mocacinno Kopi", price: "Rp0", img: "images/products/kopi/good day mocacinno kopi.png", category: "Kopi" },
  { name: "Kapal Api Mini Kopi", price: "Rp0", img: "images/products/kopi/kapal api mini kopi.png", category: "Kopi" },
  { name: "Kapal Api Special Mix Kopi", price: "Rp0", img: "images/products/kopi/kapal api special mix kopi.png", category: "Kopi" },
  { name: "Luwak White Koffie Kopi", price: "Rp0", img: "images/products/kopi/luwak white koffie kopi.png", category: "Kopi" },
  { name: "Top Coffee Gula Aren Kopi", price: "Rp0", img: "images/products/kopi/top coffee gula aren kopi.png", category: "Kopi" },
  { name: "Emeron Lovely Jeju Orange Body Lotion", price: "Rp0", img: "images/products/body lotion/emeron lovely jeju orange body lotion.png", category: "Body Lotion" }
    ];

    // 2. PENGATURAN AWAL
    let currentPage = 1;      
    let currentCategory = "Semua"; 
    let currentSort = 'asc'; 
    function parseHarga(hargaStr) {
      return parseInt(hargaStr.replace(/[^0-9]/g, '')) || 0;
    }
    const itemsPerPage = window.innerWidth <= 768 ? 12 : 12;  

    // Fungsi membuat tombol filter kategori secara otomatis dari data produk
    function buatTombolKategori() {
      const catContainer = document.getElementById('category-container');
      const listKategori = ["Semua", ...new Set(daftarProduk.map(p => p.category).filter(Boolean))];
      catContainer.innerHTML = ""; 

      listKategori.forEach(kat => {
        const button = document.createElement('button');
        button.innerText = kat;
        button.classList.add('category-btn');
        
        if (kat === currentCategory) button.classList.add('active');

        button.addEventListener('click', () => {
          currentCategory = kat;
          currentPage = 1; 
          document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
          tampilkanProduk(currentPage);
        });

        catContainer.appendChild(button);
      });
    }

    // Fungsi untuk menampilkan produk berdasarkan halaman, kata kunci pencarian, & kategori
    function tampilkanProduk(page) {
      const container = document.getElementById('tempat-produk');
      container.innerHTML = ""; 

      const kataKunci = document.getElementById('search-input').value.toLowerCase();

      const produkDifilter = daftarProduk.filter(produk => {
        const cocokKataKunci = produk.name.toLowerCase().includes(kataKunci);
        const cocokKategori = (currentCategory === "Semua") || (produk.category === currentCategory);
        return cocokKataKunci && cocokKategori;
      });

      // Proses sortir berdasarkan harga
      produkDifilter.sort((a, b) => {
        const hargaA = parseHarga(a.price);
        const hargaB = parseHarga(b.price);
        return currentSort === 'asc' ? hargaA - hargaB : hargaB - hargaA;
      });

      const startIndex = (page - 1) * itemsPerPage;
      const endIndex = page * itemsPerPage;
      const produkHalamanIni = produkDifilter.slice(startIndex, endIndex);

      produkHalamanIni.forEach(produk => {
        container.innerHTML += `
          <div class="pricing-card">
            <div class="product-image-container">
              <img src="${produk.img}" alt="${produk.name}">
            </div>
            <div class="product-name">${produk.name}</div>
            <div class="harga-durasi">
              <span class="harga">${produk.price}</span>
            </div>
          </div>
        `;
      });

      buatTombolNavigasi(produkDifilter.length);
    }

    // Fungsi membuat navigasi halaman angka otomatis
    function buatTombolNavigasi(totalItems) {
      const paginationContainer = document.getElementById('pagination-container');
      paginationContainer.innerHTML = "";

      const totalPages = Math.ceil(totalItems / itemsPerPage);
      if (totalPages <= 1) return;

      for (let i = 1; i <= totalPages; i++) {
        const button = document.createElement('button');
        button.innerText = i;
        button.classList.add('page-btn');
        
        if (i === currentPage) button.classList.add('active');

        button.addEventListener('click', () => {
          currentPage = i;
          tampilkanProduk(currentPage);
          document.getElementById('tempat-produk').scrollIntoView({ behavior: 'smooth' });
        });

        paginationContainer.appendChild(button);
      }
    }

    // Kontrol Search Input
    const searchInput = document.getElementById('search-input');
    const clearSearchBtn = document.getElementById('clear-search');
    let timerPencarian;

    searchInput.addEventListener('input', () => {
      if (searchInput.value.length > 0) {
        clearSearchBtn.style.display = 'block';
      } else {
        clearSearchBtn.style.display = 'none';
      }

      clearTimeout(timerPencarian);
      timerPencarian = setTimeout(() => {
        currentPage = 1;
        tampilkanProduk(currentPage);
      }, 2000);
    });

    clearSearchBtn.addEventListener('click', () => {
      searchInput.value = "";
      clearSearchBtn.style.display = 'none';
      currentPage = 1;
      tampilkanProduk(currentPage);
      searchInput.focus();
    });

    // JALANKAN SISTEM PERTAMA KALI
    buatTombolKategori(); 
    tampilkanProduk(currentPage);

    document.getElementById('sort-select').addEventListener('change', (e) => {
      currentSort = e.target.value;
      currentPage = 1;
      tampilkanProduk(currentPage);
    });
  </script>
</body>
</html>
